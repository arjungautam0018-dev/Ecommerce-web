<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopHub - Mobile Web App</title>
    <link rel="stylesheet" href="/css/index.css">
</head>
<body>
    <div class="body-part">
        <!-- Navbar -->
<!-- Navbar -->
<!-- Navbar -->
<div class="navbar">
    <div class="nav-bar-left">
        <h1 class="gradient-text">ShopHub</h1>
    </div>

    <div class="nav-bar-right">
        <!-- Theme / Night -->
        <svg class="icons-svg-nav" fill="none" stroke="#000" stroke-width="1.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>

        <!-- Cart -->
        <svg class="icons-svg-nav" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4"/>
            <circle cx="7" cy="21" r="2"/>
            <circle cx="17" cy="21" r="2"/>
        </svg>

        <!-- Profile -->
        <svg class="icons-svg-nav" fill="none" stroke="#000" stroke-width="1.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zM6 20c0-3.31 2.69-6 6-6s6 2.69 6 6H6z"/>
        </svg>

        <!-- Hamburger Menu -->
        <svg class="icons-svg-nav" fill="none" stroke="#000" stroke-width="1.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
    </div>
</div>

        <!-- Main Content -->
<div class="main-content">
  <div class="constant-change">
    <!-- Gradient layers -->
    <div class="gradient-layer" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></div>
    <div class="gradient-layer" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);"></div>
    <div class="gradient-layer" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);"></div>
    <div class="gradient-layer" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);"></div>

    <div class="overlay"></div>

<div class="main-text-vertical">
  <div>Discover</div>
  <div>Amazing</div>
  <div>Products</div>
</div>
    <div class="secondary-text">Shop the latest tech and gadgets</div>
    <div class="explore-now">
      <button>Explore Now</button>
    </div>
  </div>

  <!-- Top products -->
   <div class="top-products">
    <div class="text-top-products">
        <h2>Top Products</h2>
        <p>Our best-selling items</p>
    </div>

    <!-- Products -->
     <div class="products">
        <div class="product-card">
            <img class="products_images" src="/resources/sublimation_cup.webp" alt="Product 1">
            <div class="product-inform">

                <h3>Sublimation Cup</h3>
                <p class="desc-product">A premium ceramic cup with a smooth oval surface, perfect for custom sublimation printing. </p>
                <p class="price-product">Rs.5,999</p>
            </div>
            <div class="add-to-cart">
                <button>
                    <i class="fa-solid fa-cart-shopping"></i>
                        Add to Cart
                </button>
            </div>
        </div>
     </div>
   </div>
</div>
</body>
<script src="/js/index.js"></script>
</html>
